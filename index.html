<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LearnLitecoin</title>
  <meta name="description" content="LearnLitecoin helps businesses accept Litecoin and helps people learn how to buy, use, and understand Litecoin." />
  <style>
    :root { --bg:#08111d; --bg-alt:#0d1725; --panel:rgba(255,255,255,0.05); --line:rgba(255,255,255,0.10); --text:#f3f7fb; --muted:#a9b7c8; --blue:#58b8ff; --blue-strong:#2fa8ff; --shadow:0 18px 48px rgba(0,0,0,0.35); --radius:24px; --container:1180px; }
    *{box-sizing:border-box;} html{scroll-behavior:smooth;} body{margin:0;font-family:Arial,Helvetica,sans-serif;color:var(--text);background:radial-gradient(circle at top right, rgba(88,184,255,0.16), transparent 25%), radial-gradient(circle at left center, rgba(200,209,219,0.10), transparent 20%), linear-gradient(180deg,#07101b 0%,#0a1220 50%,#07101b 100%); line-height:1.6;}
    a{color:var(--blue);text-decoration:none;} .container{width:min(var(--container),calc(100% - 32px));margin:0 auto;}
    .site-header{position:sticky;top:0;z-index:50;background:rgba(7,16,27,0.88);border-bottom:1px solid var(--line);backdrop-filter:blur(10px);} .nav{display:flex;justify-content:space-between;align-items:center;gap:18px;padding:16px 0;}
    .brand{display:flex;align-items:center;gap:12px;color:white;font-weight:800;font-size:1.2rem;} .brand-coin,.coin-badge,.mini-coin{display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;border-radius:14px;color:var(--blue);background:rgba(88,184,255,0.10);border:1px solid rgba(88,184,255,0.35);box-shadow:0 8px 28px rgba(47,168,255,0.12);font-weight:900;font-size:22px;}
    .nav-links{display:flex;flex-wrap:wrap;gap:16px;} .nav-links a{color:var(--muted);font-size:0.95rem;} .nav-links a:hover{color:var(--blue);} .hero{padding:72px 0 48px;border-bottom:1px solid var(--line);} .hero-grid{display:grid;grid-template-columns:1.15fr 0.85fr;gap:34px;align-items:center;}
    .eyebrow{display:inline-block;margin-bottom:14px;font-size:0.78rem;text-transform:uppercase;letter-spacing:0.22em;color:var(--blue);font-weight:700;} h1,h2,h3,h4{margin:0 0 12px;line-height:1.12;letter-spacing:-0.03em;} h1{font-size:clamp(2.5rem,6vw,4.4rem);max-width:900px;} h2{font-size:clamp(2rem,4vw,3rem);} h3{font-size:1.35rem;} p{margin:0;color:var(--muted);} .lead{font-size:1.08rem;max-width:760px;margin-top:16px;}
    .hero-actions,.panel-actions{display:flex;flex-wrap:wrap;gap:14px;margin-top:28px;} .btn{display:inline-flex;align-items:center;justify-content:center;min-height:46px;padding:0 20px;border-radius:16px;font-weight:700;border:1px solid transparent;} .btn-primary{background:var(--blue);color:#04121d;} .btn-secondary{background:rgba(255,255,255,0.02);border-color:var(--line);color:white;}
    .stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:28px;max-width:720px;} .stat-card,.panel-card,.panel-banner,.feature-card,.mini-card,.service-panel,.cta-band{border:1px solid var(--line);background:var(--panel);border-radius:var(--radius);box-shadow:var(--shadow);} .stat-card{padding:16px 18px;} .hero-panel{display:grid;gap:18px;} .panel-card{padding:24px;} .panel-title-row{display:flex;gap:14px;align-items:center;margin-bottom:20px;}
    .steps-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;} .step-card{padding:18px;border:1px solid var(--line);border-radius:20px;background:rgba(4,10,17,0.45);} .step-label{display:inline-block;margin-bottom:10px;font-size:0.72rem;text-transform:uppercase;letter-spacing:0.18em;color:var(--blue);font-weight:700;}
    .panel-banner{padding:22px 24px;font-size:1.1rem;font-weight:700;background:linear-gradient(90deg, rgba(10,18,32,0.95), rgba(16,27,43,0.95));}
    .section{padding:72px 0;} .section-alt{background:rgba(255,255,255,0.03);border-top:1px solid var(--line);border-bottom:1px solid var(--line);} .section-heading{max-width:840px;margin-bottom:30px;}
    .card-grid{display:grid;gap:22px;} .three{grid-template-columns:repeat(3,1fr);} .four{grid-template-columns:repeat(4,1fr);} .two{grid-template-columns:repeat(2,1fr);} .feature-card,.mini-card,.service-panel,.cta-band{padding:24px;} .feature-card p,.mini-card p{margin-top:10px;}
    .split-grid{display:grid;grid-template-columns:1.15fr 0.85fr;gap:26px;align-items:start;} .service-panel{background:linear-gradient(180deg, rgba(88,184,255,0.10), rgba(255,255,255,0.04));}
    .check-list{margin:18px 0 0;padding-left:20px;color:#d7e0ea;} .check-list li + li{margin-top:8px;} .heading-row{display:flex;justify-content:space-between;align-items:end;gap:18px;} .text-link{display:inline-block;margin-top:16px;font-weight:700;}
    .cta-band{display:flex;justify-content:space-between;gap:24px;align-items:center;background:linear-gradient(90deg, rgba(88,184,255,0.10), rgba(255,255,255,0.04));}
    @media (max-width:1080px){.hero-grid,.split-grid,.three,.four{grid-template-columns:1fr 1fr;} .steps-grid{grid-template-columns:1fr;} .heading-row,.cta-band{flex-direction:column;align-items:start;}}
    @media (max-width:760px){.nav{flex-direction:column;align-items:start;} .hero-grid,.split-grid,.two,.three,.four,.stat-row{grid-template-columns:1fr;} .section,.hero{padding:56px 0;}}
  </style>
</head>

</html>
